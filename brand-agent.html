<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>enerBit · Brand Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/dom-to-pptx@latest/dist/dom-to-pptx.bundle.js"></script>

  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #F2F2F2; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Topbar ── */
    .topbar {
      background: #533583; height: 52px;
      display: flex; align-items: center; padding: 0 20px; gap: 10px; flex-shrink: 0;
    }
    .topbar-brand { font-size: 15px; font-weight: 700; color: #fff; white-space: nowrap; }
    .topbar-tag   { font-size: 11px; color: rgba(255,255,255,.45); white-space: nowrap; }
    .topbar-sep   { flex: 1; }
    .topbar-tpl   { font-size: 12px; font-weight: 600; color: rgba(255,255,255,.75); white-space: nowrap; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
    .topbar-divider { width: 1px; height: 24px; background: rgba(255,255,255,.2); }

    /* Topbar buttons */
    .tb-btn {
      font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600;
      border: none; border-radius: 6px; padding: 7px 14px; cursor: pointer;
      transition: opacity .2s; white-space: nowrap;
    }
    .tb-btn:disabled { opacity: .35; cursor: default; }
    .tb-btn:not(:disabled):hover { opacity: .82; }
    .tb-btn-ghost { background: rgba(255,255,255,.15); color: #fff; }
    .tb-btn-orange { background: #FF7C02; color: #fff; }
    .tb-btn-green  { background: #00BE91; color: #fff; }

    /* Deck badge */
    .deck-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,.18); color: #fff;
      font-size: 11px; font-weight: 700; border-radius: 6px; padding: 4px 10px;
      white-space: nowrap;
    }
    .deck-badge .count {
      background: #FF7C02; color: #fff; font-size: 10px; font-weight: 800;
      border-radius: 4px; padding: 1px 6px; min-width: 18px; text-align: center;
    }

    /* ── App layout ── */
    .app { display: flex; flex: 1; overflow: hidden; }

    /* ── Nav ── */
    .nav {
      width: 210px; flex-shrink: 0;
      background: #fff; border-right: 1px solid #e8e8e8;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .nav-templates { flex: 1; overflow-y: auto; padding: 10px 0; }
    .nav-group-label {
      font-size: 9px; font-weight: 700; color: #bbb;
      text-transform: uppercase; letter-spacing: .1em;
      padding: 10px 14px 3px;
    }
    .nav-btn {
      display: block; width: 100%; text-align: left;
      padding: 7px 14px; font-family: 'Inter', sans-serif;
      font-size: 11.5px; font-weight: 500; color: #444;
      background: none; border: none; cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .12s, color .12s;
    }
    .nav-btn:hover { background: #f5f0fb; color: #533583; }
    .nav-btn.active { background: #f0eaf8; color: #533583; font-weight: 700; border-left-color: #533583; }
    .nav-btn .nav-desc { display: block; font-size: 10px; font-weight: 400; color: #bbb; margin-top: 1px; }
    .nav-btn.active .nav-desc { color: rgba(83,53,131,.5); }

    /* ── Deck panel (bottom of nav) ── */
    .deck-panel {
      border-top: 1.5px solid #ece6f5; background: #faf8fe;
      flex-shrink: 0; max-height: 240px; display: flex; flex-direction: column;
    }
    .deck-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px 6px; flex-shrink: 0;
    }
    .deck-header-label { font-size: 9px; font-weight: 700; color: #533583; text-transform: uppercase; letter-spacing: .1em; }
    .deck-clear-btn {
      font-family: 'Inter', sans-serif; font-size: 10px; color: #aaa;
      background: none; border: none; cursor: pointer; padding: 2px 4px; border-radius: 4px;
    }
    .deck-clear-btn:hover { color: #e53935; background: #fce4e4; }
    .deck-list { overflow-y: auto; flex: 1; padding: 0 8px 4px; }
    .deck-item {
      display: flex; align-items: center; gap: 6px;
      background: #fff; border: 1px solid #e8e4f2; border-radius: 6px;
      padding: 5px 8px; margin-bottom: 4px; cursor: grab;
    }
    .deck-item:active { cursor: grabbing; }
    .deck-item-num {
      font-size: 10px; font-weight: 700; color: rgba(83,53,131,.5);
      width: 14px; text-align: center; flex-shrink: 0;
    }
    .deck-item-name { font-size: 11px; font-weight: 500; color: #444; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .deck-item-remove {
      font-size: 14px; color: #ccc; background: none; border: none; cursor: pointer;
      padding: 0 2px; line-height: 1; flex-shrink: 0;
    }
    .deck-item-remove:hover { color: #e53935; }
    .deck-download {
      flex-shrink: 0; padding: 8px;
    }
    .deck-download-btn {
      display: block; width: 100%;
      font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 700;
      background: #533583; color: #fff; border: none; border-radius: 7px;
      padding: 9px 0; cursor: pointer; transition: opacity .2s; text-align: center;
    }
    .deck-download-btn:disabled { opacity: .35; cursor: default; }
    .deck-download-btn:not(:disabled):hover { opacity: .85; }
    .deck-empty { font-size: 10px; color: #bbb; text-align: center; padding: 10px 12px; }

    /* ── Form panel ── */
    .panel {
      width: 258px; flex-shrink: 0;
      background: #fafafa; border-right: 1px solid #e8e8e8;
      overflow-y: auto; padding: 14px 12px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .panel-section { display: flex; flex-direction: column; gap: 8px; }
    .panel-empty { color: #bbb; font-size: 12px; text-align: center; margin-top: 40px; }
    .section-label {
      font-size: 9px; font-weight: 700; color: #533583;
      text-transform: uppercase; letter-spacing: .1em;
      padding-bottom: 5px; border-bottom: 1.5px solid #ece6f5;
    }
    .field { display: flex; flex-direction: column; gap: 3px; }
    .field label { font-size: 10px; font-weight: 600; color: #666; }
    .field input, .field textarea, .field select {
      font-family: 'Inter', sans-serif; font-size: 11.5px; color: #333;
      border: 1.5px solid #e0e0e0; border-radius: 6px; padding: 6px 8px;
      outline: none; transition: border-color .2s; resize: none; background: #fff;
    }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: #533583; }

    /* ── Preview ── */
    .preview-area {
      flex: 1; display: flex; align-items: center; justify-content: center;
      background: #DCDCDC; overflow: hidden; position: relative;
    }
    .preview-empty { color: #aaa; font-size: 13px; text-align: center; }
    #slide-scaler {
      transform-origin: center center;
      will-change: transform;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      transform: translateZ(0);
    }
    .s-static { image-rendering: -webkit-optimize-contrast; image-rendering: high-quality; }

    /* ── Add to deck button (inside panel) ── */
    .add-deck-btn {
      display: block; width: 100%; margin-top: 4px;
      font-family: 'Inter', sans-serif; font-size: 11.5px; font-weight: 700;
      background: #f0eaf8; color: #533583; border: 1.5px solid #d5c8f0;
      border-radius: 7px; padding: 9px 0; cursor: pointer;
      transition: background .15s; text-align: center;
    }
    .add-deck-btn:hover { background: #e4d9f7; }

    /* ── Image picker ── */
    .img-picker {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px;
      max-height: 210px; overflow-y: auto;
      border: 1.5px solid #e0e0e0; border-radius: 8px;
      padding: 5px; background: #fff;
    }
    .img-thumb {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      cursor: pointer; border-radius: 6px; padding: 3px;
      border: 2px solid transparent; transition: border-color .15s, background .15s;
    }
    .img-thumb:hover { border-color: #d5c8f0; background: #f5f0fb; }
    .img-thumb.selected { border-color: #533583; background: #f0eaf8; }
    .img-thumb img { width: 100%; height: 44px; object-fit: contain; border-radius: 3px; }
    .img-thumb span { font-size: 8px; color: #999; text-align: center; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; }
    .img-loading { font-size: 10px; color: #aaa; text-align: center; padding: 12px 0; }
    .img-hint { font-size: 10px; color: #FF7C02; font-weight: 600; margin-bottom: 6px; background: #fff4eb; border-radius: 6px; padding: 5px 8px; text-align: center; }
    .picker-sub-label { font-size: 9px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }

    /* ── Toggle switch ── */
    .field-toggle { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .field-toggle label:first-child { margin: 0; font-weight: 500; color: #444; font-size: 12px; }
    .toggle-switch { position: relative; display: inline-block; width: 36px; height: 20px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-slider { position: absolute; cursor: pointer; inset: 0; background: #ddd; border-radius: 20px; transition: background .2s; }
    .toggle-slider:before { content: ''; position: absolute; width: 14px; height: 14px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
    .toggle-switch input:checked + .toggle-slider { background: #533583; }
    .toggle-switch input:checked + .toggle-slider:before { transform: translateX(16px); }

    /* ── Slide base ── */
    #slide-container {
      width: 960px; height: 540px;
      position: relative; overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    /* ── Deck slide render area (off-screen) ── */
    #deck-render-area {
      position: fixed; left: -9999px; top: 0; pointer-events: none;
    }
    .deck-slide-host {
      width: 960px; height: 540px;
      position: relative; overflow: hidden;
      font-family: 'Inter', sans-serif;
    }
  </style>

</head>

async function loadRepoMockups() {
  try {
    const resp = await fetch('https://api.github.com/repos/LauraenerBit2026/tokens-brand-tokens.css/contents/mockups');
    if (!resp.ok) return;
    const files = await resp.json();
    const imgs = files.filter(f => f.type === 'file' && /\.(png|jpg|jpeg|gif|webp)$/i.test(f.name));
    if (imgs.length > 0) repoMockups = imgs.map(f => ({ name: f.name }));
  } catch(e) { /* use fallback */ }
}

async function loadRepoImages() {
  try {
    const resp = await fetch('https://api.github.com/repos/LauraenerBit2026/tokens-brand-tokens.css/contents/images');
    if (!resp.ok) return;
    const files = await resp.json();
    const imgs = files.filter(f => f.type === 'file' && /\.(png|jpg|jpeg|gif|webp)$/i.test(f.name));
    if (imgs.length > 0) repoImages = imgs.map(f => ({ name: f.name }));
  } catch(e) { /* use fallback */ }
}

// ── Build nav ─────────────────────────────────────────────────────────────────
function buildNav() {
  const nav = document.getElementById('nav');
  const groups = {};
  for (const t of TEMPLATES) {
    if (!groups[t.group]) groups[t.group] = [];
    groups[t.group].push(t);
  }
  const GROUP_ORDER = ['Portadas','Simples','Cierres','Estáticas','Contenido','Con fondo degradado'];
  const sortedGroups = [
    ...GROUP_ORDER.filter(g => groups[g]),
    ...Object.keys(groups).filter(g => !GROUP_ORDER.includes(g))
  ];
  let html = '';
  for (const g of sortedGroups) {
    const tpls = groups[g];
    html += `<p class="nav-group-label">${g}</p>`;
    for (const t of tpls) {
      html += `<button class="nav-btn" data-id="${t.id}"><span>${t.name}</span><span class="nav-desc">${t.desc}</span></button>`;
    }
  }
  nav.innerHTML = html;
  nav.addEventListener('click', e => {
    const btn = e.target.closest('.nav-btn');
    if (btn) selectTemplate(btn.dataset.id);
  });
}

// ── Build panel form ──────────────────────────────────────────────────────────
function buildPanel(tpl) {
  let html = '';
  let inSection = false;
  for (const f of tpl.fields) {
    if (f.section !== undefined) {
      if (inSection) html += '</div>';
      html += `<div class="panel-section"><p class="section-label">${f.section}</p>`;
      inSection = true;
      continue;
    }
    const val = currentValues[f.id] ?? f.val;
    if (f.type === 'text') {
      html += `<div class="field"><label>${f.label}</label><input type="text" data-fid="${f.id}" value="${esc(val)}"></div>`;
    } else if (f.type === 'textarea') {
      html += `<div class="field"><label>${f.label}</label><textarea data-fid="${f.id}" rows="3">${esc(val)}</textarea></div>`;
    } else if (f.type === 'toggle') {
      const checked = (currentValues[f.id] ?? f.val) !== false;
      html += `<div class="field field-toggle"><label>${f.label}</label><label class="toggle-switch"><input type="checkbox" data-fid="${f.id}"${checked?' checked':''}><span class="toggle-slider"></span></label></div>`;
    } else if (f.type === 'image-pick') {
      const thumbs = repoImages.length
        ? repoImages.map(img => `
            <div class="img-thumb${val===img.name?' selected':''}" data-fid="${f.id}" data-val="${img.name}">
              <img src="${IMGS}${img.name}" alt="${img.name}" crossorigin="anonymous">
              <span>${img.name.replace(/\.[^.]+$/,'').replace(/_/g,' ')}</span>
            </div>`).join('')
        : `<p class="img-loading">Cargando imágenes…</p>`;
      html += `<div class="field"><label>${f.label}</label><p class="img-hint">Elige la imagen para el slide</p><div class="img-picker">${thumbs}</div></div>`;
    } else if (f.type === 'mockup-pick') {
      let list = f.options ? f.options.map(name => ({name})) : repoMockups;
      if (f.mockupEndsWith) list = list.filter(img => img.name.replace(/\.[^.]+$/,'').endsWith(f.mockupEndsWith));
      const thumbs = list.length
        ? list.map(img => `
            <div class="img-thumb${val===img.name?' selected':''}" data-fid="${f.id}" data-val="${img.name}" data-folder="mockups">
              <img src="${CDN}/mockups/${img.name}" alt="${img.name}" crossorigin="anonymous">
              <span>${img.name.replace(/\.[^.]+$/,'').replace(/_/g,' ')}</span>
            </div>`).join('')
        : `<p class="img-loading">Cargando mockups…</p>`;
      html += `<div class="field"><label>${f.label}</label><p class="img-hint">Elige la imagen para el slide</p><div class="img-picker">${thumbs}</div></div>`;
    } else if (f.type === 'any-pick') {
      // Unified picker: biters + mockups, value = "mockups/filename" or "filename"
      const biterThumbs = repoImages.map(img => `
          <div class="img-thumb${val===img.name?' selected':''}" data-fid="${f.id}" data-val="${img.name}">
            <img src="${IMGS}${img.name}" alt="${img.name}" crossorigin="anonymous">
            <span>${img.name.replace(/\.[^.]+$/,'').replace(/_/g,' ')}</span>
          </div>`).join('');
      const mockupList = f.mockupEndsWith
        ? repoMockups.filter(img => img.name.replace(/\.[^.]+$/,'').endsWith(f.mockupEndsWith))
        : repoMockups;
      const mockupThumbs = mockupList.map(img => `
          <div class="img-thumb${val==='mockups/'+img.name?' selected':''}" data-fid="${f.id}" data-val="mockups/${img.name}" data-folder="mockups">
            <img src="${CDN}/mockups/${img.name}" alt="${img.name}" crossorigin="anonymous">
            <span>${img.name.replace(/\.[^.]+$/,'').replace(/_/g,' ')}</span>
          </div>`).join('');
      html += `<div class="field"><label>${f.label}</label>
        <p class="img-hint">Elige la imagen para el slide</p>
        <p class="picker-sub-label">Personas</p>
        <div class="img-picker">${biterThumbs || '<p class="img-loading">Cargando…</p>'}</div>
        <p class="picker-sub-label" style="margin-top:10px">Mockups de app</p>
        <div class="img-picker">${mockupThumbs || '<p class="img-loading">Cargando…</p>'}</div>
      </div>`;
    }
  }
  if (inSection) html += '</div>';
  // Add to deck button at bottom
  html += `<button class="add-deck-btn" id="add-deck-btn">+ Agregar al deck</button>`;
  document.getElementById('panel').innerHTML = html;
  document.getElementById('add-deck-btn').addEventListener('click', addToDeck);
}

// ── Render preview slide ──────────────────────────────────────────────────────
function renderSlide(tpl) {
  document.getElementById('tpl-css').textContent = tpl.css;
  document.getElementById('slide-container').innerHTML = tpl.render(currentValues);
  // Apply logo visibility
  if (currentValues['logo'] === false) {
    const logoEl = document.getElementById('slide-container').querySelector('.s-logo');
    if (logoEl) logoEl.style.display = 'none';
  }
  // If biter/mockup fails, fall back to first available image from repo
  function fallbackImg(img) {
    const isMockup = img.classList.contains('s-mockup') || img.classList.contains('s-phone');
    const fallbacks = isMockup ? repoMockups : repoImages;
    if (fallbacks.length > 0) {
      img.onerror = null; // prevent loop
      img.src = isMockup ? `${CDN}/mockups/${fallbacks[0].name}` : IMGS + fallbacks[0].name;
    }
  }
  document.getElementById('slide-container').querySelectorAll('img.s-biter, img.s-mockup, img.s-phone').forEach(img => {
    img.onerror = function() { fallbackImg(this); };
    if (img.complete && img.naturalHeight === 0) fallbackImg(img);
  });
}

// ── Update single field in preview ───────────────────────────────────────────
function updateField(fieldId, val) {
  if (fieldId === 'logo') {
    const logoEl = document.getElementById('slide-container').querySelector('.s-logo');
    if (logoEl) logoEl.style.display = val ? '' : 'none';
    return;
  }
  const el = document.getElementById('eb-' + fieldId);
  if (!el) return;
  if (el.tagName === 'IMG') {
    const f = currentTpl.fields.find(f => f.id === fieldId);
    if (f && f.type === 'mockup-pick') {
      el.src = `${CDN}/mockups/${val}`;
    } else if (f && f.type === 'any-pick') {
      el.src = val.startsWith('mockups/') ? `${CDN}/${val}` : IMGS + val;
    } else {
      el.src = IMGS + val;
    }
  }
  else el.textContent = val;
}

// ── Select template ───────────────────────────────────────────────────────────
function selectTemplate(id) {
  currentTpl = TEMPLATES.find(t => t.id === id);
  if (!currentTpl) return;

  currentValues = {};
  for (const f of currentTpl.fields) {
    if (f.id) currentValues[f.id] = f.val;
  }

  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.id === id));
  document.getElementById('topbar-tpl-name').textContent = currentTpl.name;
  document.getElementById('export-slide-btn').disabled = false;
  document.getElementById('preview-empty').style.display = 'none';
  document.getElementById('slide-scaler').style.display = '';

  buildPanel(currentTpl);
  renderSlide(currentTpl);
  scaleSlide();
}

// ── Scale preview ─────────────────────────────────────────────────────────────
function scaleSlide() {
  const area   = document.getElementById('preview-area');
  const scaler = document.getElementById('slide-scaler');
  const s = Math.min((area.clientWidth - 48) / 960, (area.clientHeight - 48) / 540, 1);
  scaler.style.transform = `scale(${s}) translateZ(0)`;
}

// ── Deck: add current template ────────────────────────────────────────────────
function addToDeck() {
  if (!currentTpl) return;
  deck.push({ tplId: currentTpl.id, values: { ...currentValues }, label: currentTpl.name });
  updateDeckUI();
}

// ── Deck: remove item ─────────────────────────────────────────────────────────
function removeDeckItem(idx) {
  deck.splice(idx, 1);
  updateDeckUI();
}

// ── Deck: update UI ───────────────────────────────────────────────────────────
function updateDeckUI() {
  const count     = deck.length;
  const badge     = document.getElementById('deck-badge');
  const countEl   = document.getElementById('deck-count');
  const listEl    = document.getElementById('deck-list');
  const emptyMsg  = document.getElementById('deck-empty-msg');
  const dlBtn     = document.getElementById('deck-download-btn');
  const topDlBtn  = document.getElementById('export-deck-btn');

  countEl.textContent = count;
  badge.style.display = count > 0 ? '' : 'none';
  topDlBtn.disabled   = count < 2;
  dlBtn.disabled      = count < 2;

  if (count === 0) {
    listEl.innerHTML = '<p class="deck-empty" id="deck-empty-msg">Agrega slides para armar tu presentación</p>';
    return;
  }

  listEl.innerHTML = deck.map((item, i) => `
    <div class="deck-item" draggable="true" data-idx="${i}">
      <span class="deck-item-num">${i+1}</span>
      <span class="deck-item-name">${esc(item.label)}</span>
      <button class="deck-item-remove" data-remove="${i}" title="Quitar">×</button>
    </div>
  `).join('');

  // Remove buttons
  listEl.querySelectorAll('[data-remove]').forEach(btn => {
    btn.addEventListener('click', e => {
      removeDeckItem(parseInt(e.currentTarget.dataset.remove));
    });
  });

  // Drag to reorder
  let dragIdx = null;
  listEl.querySelectorAll('.deck-item').forEach(el => {
    el.addEventListener('dragstart', () => { dragIdx = parseInt(el.dataset.idx); });
    el.addEventListener('dragover', e => { e.preventDefault(); });
    el.addEventListener('drop', () => {
      const dropIdx = parseInt(el.dataset.idx);
      if (dragIdx === null || dragIdx === dropIdx) return;
      const moved = deck.splice(dragIdx, 1)[0];
      deck.splice(dropIdx, 0, moved);
      updateDeckUI();
    });
  });
}

// ── CSS scoping ───────────────────────────────────────────────────────────────
function scopeCSS(css, id) {
  return css
    .replace(/#slide-container/g, `#${id}`)
    .replace(/(^|[\s{,])\.s-/gm, (m, pre) => `${pre}#${id} .s-`);
}

// ── Deck export ───────────────────────────────────────────────────────────────
async function exportDeck() {
  if (deck.length === 0) return;

  const btn1 = document.getElementById('export-deck-btn');
  const btn2 = document.getElementById('deck-download-btn');
  btn1.textContent = 'Generando...'; btn1.disabled = true;
  btn2.textContent = 'Generando...'; btn2.disabled = true;

  const renderArea = document.getElementById('deck-render-area');
  renderArea.innerHTML = '';

  // Aggregate scoped CSS and render HTML for each slide
  let allCSS = `
    .deck-slide-host {
      width:960px; height:540px;
      position:relative; overflow:hidden;
      font-family:'Inter',sans-serif;
    }
  `;
  const selectors = [];

  deck.forEach((item, i) => {
    const tpl = TEMPLATES.find(t => t.id === item.tplId);
    if (!tpl) return;
    const slideId = `ds-${i}`;
    selectors.push(`#${slideId}`);
    allCSS += scopeCSS(tpl.css, slideId);
    const div = document.createElement('div');
    div.id = slideId;
    div.className = 'deck-slide-host';
    div.innerHTML = tpl.render(item.values);
    renderArea.appendChild(div);
  });

  document.getElementById('deck-render-css').textContent = allCSS;

  // Wait for images to load
  const imgs = renderArea.querySelectorAll('img');
  await Promise.all(Array.from(imgs).map(img =>
    img.complete ? Promise.resolve() : new Promise(r => { img.onload = r; img.onerror = r; })
  ));
  // Extra buffer for rendering
  await new Promise(r => setTimeout(r, 400));

  try {
    document.querySelectorAll(selectors.join(',') + ' *').forEach(el => {
      if (el.className && typeof el.className !== 'string')
        el.setAttribute('class', el.className.baseVal || '');
    });
    await domToPptx.exportToPptx(selectors, {
      fileName: 'deck-enerbit.pptx',
      autoEmbedFonts: true,
    });
  } catch (e) {
    alert('Error al exportar: ' + e.message);
  }

  // Cleanup
  renderArea.innerHTML = '';
  document.getElementById('deck-render-css').textContent = '';

  btn1.textContent = '⬇ Descargar deck'; btn1.disabled = deck.length < 2;
  btn2.textContent = '⬇ Descargar deck PPTX'; btn2.disabled = deck.length < 2;
}

// ── Events ────────────────────────────────────────────────────────────────────
document.getElementById('panel').addEventListener('input', e => {
  const fid = e.target.dataset.fid;
  if (!fid || e.target.type === 'checkbox') return;
  currentValues[fid] = e.target.value;
  updateField(fid, e.target.value);
});

document.getElementById('panel').addEventListener('change', e => {
  if (e.target.type !== 'checkbox') return;
  const fid = e.target.dataset.fid;
  if (!fid) return;
  currentValues[fid] = e.target.checked;
  updateField(fid, e.target.checked);
});

document.getElementById('panel').addEventListener('click', e => {
  const thumb = e.target.closest('.img-thumb');
  if (!thumb) return;
  const fid = thumb.dataset.fid;
  const val = thumb.dataset.val;
  thumb.closest('.img-picker').querySelectorAll('.img-thumb').forEach(t => t.classList.remove('selected'));
  thumb.classList.add('selected');
  currentValues[fid] = val;
  updateField(fid, val);
});

document.getElementById('export-slide-btn').addEventListener('click', async () => {
  if (!currentTpl) return;
  const btn = document.getElementById('export-slide-btn');
  btn.textContent = 'Generando...'; btn.disabled = true;
  try {
    document.querySelectorAll('#slide-container *').forEach(el => {
      if (el.className && typeof el.className !== 'string')
        el.setAttribute('class', el.className.baseVal || '');
    });
    await domToPptx.exportToPptx('#slide-container', {
      fileName: currentTpl.fileName, autoEmbedFonts: true,
    });
  } catch (e) { alert('Error: ' + e.message); }
  btn.textContent = '⬇ Este slide'; btn.disabled = false;
});

document.getElementById('export-deck-btn').addEventListener('click', exportDeck);
document.getElementById('deck-download-btn').addEventListener('click', exportDeck);
document.getElementById('deck-clear-btn').addEventListener('click', () => { deck = []; updateDeckUI(); });

// ── Init ──────────────────────────────────────────────────────────────────────
buildNav();
scaleSlide();
window.addEventListener('resize', scaleSlide);
loadRepoImages();   // fetch biter images from GitHub (non-blocking)
loadRepoMockups();  // fetch mockup images from GitHub (non-blocking)
</script>
